<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamplan - Crazyfunworld</title>
    
    <!-- React & Babel für die Ausführung im Browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS für das Design -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        // Firebase global verfügbar machen für Babel
        window.FirebaseSDK = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, doc, setDoc, onSnapshot };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #060b13; 
            color: #e1e1e1; 
            margin: 0; 
            overflow-x: hidden; 
        }
        .font-header { font-family: 'Rajdhani', sans-serif; }
        .neon-text { text-shadow: 0 0 15px rgba(34, 211, 238, 0.6); }
        .blink { animation: blinker 2s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #060b13; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [streamData, setStreamData] = useState({});
            const [isAdmin, setIsAdmin] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            
            const [showLogin, setShowLogin] = useState(false);
            const [passwordInput, setPasswordInput] = useState("");
            const [loginError, setLoginError] = useState(false);

            const days = ["Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag", "Sonntag"];
            
            // App-ID und Passwort
            const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'streamplan-crazyfunworld';
            const ADMIN_PASSWORD = "ttvcfw24"; 

            // 1. Firebase Initialisierung
            useEffect(() => {
                try {
                    const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
                    if (!firebaseConfig.apiKey) {
                        console.error("Firebase Config fehlt!");
                        return;
                    }
                    const app = window.FirebaseSDK.initializeApp(firebaseConfig);
                    const auth = window.FirebaseSDK.getAuth(app);
                    const firestore = window.FirebaseSDK.getFirestore(app);
                    setDb(firestore);

                    const initAuth = async () => {
                        if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                            await window.FirebaseSDK.signInWithCustomToken(auth, window.__initial_auth_token);
                        } else {
                            await window.FirebaseSDK.signInAnonymously(auth);
                        }
                    };

                    initAuth();
                    const unsubscribe = window.FirebaseSDK.onAuthStateChanged(auth, setUser);
                    return () => unsubscribe();
                } catch (e) {
                    console.error("Initialisierungsfehler:", e);
                }
            }, []);

            // 2. Echtzeit-Daten laden
            useEffect(() => {
                if (!user || !db) return;

                const docRef = window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'schedule', 'weekly_plan_v1');
                
                const unsubscribe = window.FirebaseSDK.onSnapshot(docRef, 
                    (docSnap) => {
                        if (docSnap.exists()) {
                            setStreamData(docSnap.data() || {});
                        }
                    }, 
                    (error) => console.error("Firestore Fehler:", error)
                );

                return () => unsubscribe();
            }, [user, db, appId]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (passwordInput === ADMIN_PASSWORD) {
                    setIsAdmin(true);
                    setShowLogin(false);
                    setLoginError(false);
                    setPasswordInput("");
                } else {
                    setLoginError(true);
                    setPasswordInput("");
                }
            };

            const handleSave = async () => {
                if (!isAdmin || !db || !user) return;
                setIsSaving(true);
                try {
                    const docRef = window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'schedule', 'weekly_plan_v1');
                    await window.FirebaseSDK.setDoc(docRef, streamData);
                } catch (err) {
                    console.error("Speicherfehler:", err);
                } finally {
                    setIsSaving(false);
                }
            };

            const updateField = (dayOrKey, field, value) => {
                setStreamData(prev => ({
                    ...prev,
                    [dayOrKey]: {
                        ...(prev[dayOrKey] || {}),
                        [field]: value
                    }
                }));
            };

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#060b13]">
                        <div className="flex flex-col items-center gap-4 text-cyan-400 font-bold animate-pulse uppercase tracking-widest font-header">
                            Initialisiere Streamplan...
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-4 md:p-8 relative">
                    {/* Admin Toolbar */}
                    {isAdmin && (
                        <div className="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-[#111827]/95 backdrop-blur-xl border border-cyan-500/40 px-6 py-2 rounded-full flex items-center gap-4 shadow-2xl">
                            <div className="text-cyan-400 font-bold text-[10px] uppercase tracking-widest">Editor Modus</div>
                            <button 
                                onClick={handleSave}
                                disabled={isSaving}
                                className="bg-cyan-500 hover:bg-cyan-400 text-[#060b13] font-bold py-1 px-4 rounded-full text-xs transition-all uppercase disabled:opacity-50"
                            >
                                {isSaving ? "Sichere..." : "Speichern"}
                            </button>
                            <button onClick={() => setIsAdmin(false)} className="text-white/40 hover:text-white text-[10px] uppercase font-bold">Logout</button>
                        </div>
                    )}

                    {/* Login Modal */}
                    {showLogin && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
                            <div className="bg-[#0f172a] border border-cyan-500/30 p-8 rounded-2xl w-full max-w-sm shadow-2xl">
                                <h3 className="text-2xl font-bold font-header text-cyan-400 mb-4 uppercase italic">Admin Login</h3>
                                <form onSubmit={handleLogin} className="space-y-4">
                                    <input 
                                        type="password" 
                                        placeholder="Passwort..."
                                        value={passwordInput}
                                        onChange={(e) => setPasswordInput(e.target.value)}
                                        className={`w-full bg-white/5 border ${loginError ? 'border-red-500' : 'border-white/10'} rounded-lg p-3 outline-none focus:border-cyan-500 text-white`}
                                        autoFocus
                                    />
                                    {loginError && <p className="text-red-500 text-[10px] font-bold uppercase tracking-wider">Falsch!</p>}
                                    <div className="flex gap-2">
                                        <button type="submit" className="flex-grow bg-cyan-500 text-[#060b13] font-bold py-2 rounded-lg hover:bg-cyan-400 transition-colors uppercase text-sm">Login</button>
                                        <button type="button" onClick={() => setShowLogin(false)} className="px-4 py-2 text-white/40 hover:text-white text-sm uppercase">X</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    <div className="max-w-6xl mx-auto">
                        <header className="text-center mb-12 relative pt-12">
                            <h1 className="text-6xl md:text-8xl font-black uppercase tracking-tighter text-cyan-400 neon-text font-header italic">
                                Streamplan
                            </h1>
                            <p className="text-lg md:text-xl font-bold tracking-[0.5em] text-purple-500 uppercase -mt-2">
                                Crazyfunworld
                            </p>
                        </header>

                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
                            {days.map((day) => (
                                <div key={day} className="group bg-[#0f172a]/90 border border-white/5 rounded-sm p-6 flex flex-col min-h-[300px] relative transition-all hover:border-cyan-500/30">
                                    <div className="absolute top-0 left-0 w-full h-[2px] bg-cyan-500 opacity-20 group-hover:opacity-100 transition-opacity"></div>
                                    <h2 className="text-3xl font-bold text-cyan-400 font-header uppercase mb-6 border-b border-cyan-500/10 pb-1 italic">{day}</h2>
                                    
                                    <div className="space-y-6">
                                        <div>
                                            <label className="text-[9px] uppercase tracking-widest text-white/30 font-bold block mb-1 italic">Spiel / Inhalt</label>
                                            <input 
                                                type="text" 
                                                value={streamData[day]?.game || ""} 
                                                onChange={(e) => updateField(day, 'game', e.target.value)}
                                                disabled={!isAdmin}
                                                placeholder="PAUSE"
                                                className="w-full bg-transparent border-none text-lg font-medium outline-none text-white placeholder:text-white/5"
                                            />
                                        </div>
                                        <div className="flex items-center gap-2 text-xs font-bold text-purple-400">
                                            <div className="w-1.5 h-1.5 bg-red-600 rounded-full blink"></div>
                                            TWITCH LIVE
                                        </div>
                                    </div>
                                    
                                    <div className="mt-auto pt-6 flex items-center justify-between text-[11px] font-bold text-cyan-500/60 group-hover:text-cyan-400 uppercase tracking-tighter">
                                        <div className="flex items-center gap-1">
                                            <input type="text" value={streamData[day]?.start || "--:--"} onChange={(e) => updateField(day, 'start', e.target.value)} disabled={!isAdmin} className="w-10 bg-transparent text-center outline-none focus:text-white" />
                                            <span>BIS</span>
                                            <input type="text" value={streamData[day]?.end || "--:--"} onChange={(e) => updateField(day, 'end', e.target.value)} disabled={!isAdmin} className="w-10 bg-transparent text-center outline-none focus:text-white" />
                                            <span>UHR</span>
                                        </div>
                                    </div>
                                </div>
                            ))}

                            {/* Info Box */}
                            <div className="bg-[#0f172a]/90 border border-purple-500/20 rounded-sm p-6 flex flex-col relative transition-all hover:border-purple-500/40 lg:col-span-1">
                                <div className="absolute top-0 left-0 w-full h-[2px] bg-purple-500 opacity-40"></div>
                                <h2 className="text-3xl font-bold text-purple-400 font-header uppercase mb-6 border-b border-purple-500/10 pb-1 italic">Infos</h2>
                                <div className="flex-grow flex flex-col">
                                    <label className="text-[9px] uppercase tracking-widest text-white/30 font-bold block mb-2">Ankündigung</label>
                                    {isAdmin ? (
                                        <textarea 
                                            value={streamData['extra']?.info || ""} 
                                            onChange={(e) => updateField('extra', 'info', e.target.value)}
                                            placeholder="News hier..."
                                            className="w-full flex-grow bg-white/5 text-sm text-white border border-white/5 rounded-lg p-3 outline-none focus:border-cyan-500/50 resize-none"
                                        />
                                    ) : (
                                        <div className="flex-grow bg-white/5 rounded-lg p-3 border border-white/5 overflow-y-auto max-h-[160px]">
                                            <p className="text-white/70 text-sm leading-relaxed whitespace-pre-wrap italic">
                                                {streamData['extra']?.info || "Derzeit keine speziellen News. Schaltet ein!"}
                                            </p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        <footer className="mt-20 border-t border-white/5 pt-8 text-center opacity-30">
                            <p className="text-sm md:text-xl tracking-[0.5em] text-white uppercase font-medium italic">twitch.tv/crazyfunworld</p>
                        </footer>
                    </div>

                    {!isAdmin && (
                        <button 
                            onClick={() => setShowLogin(true)}
                            className="fixed bottom-6 right-6 bg-white/5 hover:bg-white/10 text-white/20 hover:text-cyan-400 border border-white/5 px-4 py-2 rounded-full text-[10px] uppercase font-bold tracking-widest transition-all shadow-lg"
                        >
                            Bearbeiten
                        </button>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
